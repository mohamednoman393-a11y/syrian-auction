<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مزاد دمشق الاحترافي</title>
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --text: #ffffff; --accent: #9d4edd; }
        body.light { --bg: #f4f4f4; --card: #ffffff; --text: #1a1a1a; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 90px; transition: 0.4s; }
        .page { display: none; padding: 20px; }
        .active { display: block; }
        .glass { background: var(--card); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); padding: 20px; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 20px 0; border-top: 1px solid #333; backdrop-filter: blur(10px); }
        .btn-action { background: var(--accent); color: white; padding: 12px 25px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; }
        input, select, textarea { background: #333; color: white; width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #444; margin: 10px 0; box-sizing: border-box; }
    </style>
</head>
<body>

    <!-- الصفحات الديناميكية -->
    <div id="main-page" class="page active">
        <h1>مزاد دمشق</h1>
        <div id="cat-grid" class="grid"></div>
    </div>

    <div id="add-page" class="page">
        <h2>إضافة إعلان احترافي</h2>
        <form id="ad-form">
            <input type="text" placeholder="عنوان الإعلان" required>
            <input type="number" placeholder="السعر" required>
            <select><option>دولار</option><option>ليرة سورية</option></select>
            <textarea placeholder="وصف تفصيلي..." required></textarea>
            <button type="submit" class="btn-action">رفع الإعلان للمراجعة</button>
        </form>
    </div>

    <div id="admin-page" class="page">
        <h2>لوحة تحكم M</h2>
        <div id="admin-list"></div>
    </div>

    <!-- الشريط السفلي -->
    <div class="nav-bottom">
        <div onclick="show('main-page')">🏠</div>
        <div onclick="show('add-page')">➕</div>
        <div onclick="show('settings-page')">⚙️</div>
    </div>

    <script>
        // قاعدة البيانات المركزية (يمكن توسيعها لمليارات الإدخالات)
        const categories = [
            {n:"سكني للبيع", i:"🏠"}, {n:"أراضي", i:"🏗️"}, {n:"أثاث", i:"🛋️"}, {n:"سيارات", i:"🚗"}, 
            {n:"هواتف", i:"📱"}, {n:"إلكترونيات", i:"💻"}, {n:"خدمات", i:"🛠️"}, {n:"حيوانات", i:"🐾"},
            // ... أضف الـ 31 هنا
        ];

        // تهيئة التطبيق
        function init() {
            const grid = document.getElementById('cat-grid');
            categories.forEach(c => {
                grid.innerHTML += `<div class="glass" onclick="alert('فتح ${c.n}')">${c.i}<br>${c.n}</div>`;
            });
        }

        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function openAdmin() {
            if(prompt("كلمة المرور:") === "2008n2008M") show('admin-page');
            else alert("خطأ!");
        }

        init();
    </script>
</body>
</html>
