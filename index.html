<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="مزاد دمشق - أكبر منصة إعلانات ومزادات في المحافظات السورية">
    <title>مزاد دمشق 🇸🇾</title>
    <meta name="theme-color" content="#121212">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyAvdxlQipjpSDcwex5Ucc0KXSw07RO2mPE", authDomain: "gg55-9a884.firebaseapp.com", projectId: "gg55-9a884", storageBucket: "gg55-9a884.firebasestorage.app", messagingSenderId: "82936706158", appId: "1:82936706158:web:36e00ec48e134f5205227f" };
        window.db = getFirestore(initializeApp(firebaseConfig));
        window.colRef = collection(window.db, "ads");
        window.increment = increment;
    </script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #ffffff; margin: 0; padding: 20px; }
        .page { display: none; } .active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 15px; border: 1px solid #333; text-align: center; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #27ae60; }
        input, select, textarea { width: 100%; padding: 15px; margin: 10px 0; background: #2b2b2b !important; color: #ffffff !important; border: 2px solid #555 !important; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background: #27ae60; color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .ad-box { background: #1e1e1e; padding: 20px; margin-bottom: 15px; border-radius: 10px; border-right: 5px solid #27ae60; }
        .featured { border-right: 5px solid #f1c40f; }
        .del-btn { background: #c0392b !important; }
        .ad-img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; margin: 5px; }
    </style>
</head>
<body>

<div id="pStart" class="page active">
    <h1 style="text-align:center">🇸🇾 اختر المحافظة</h1>
    <div class="grid" id="cityGrid"></div>
</div>

<div id="p1" class="page">
    <button style="background:#555" onclick="showPage('pStart')">← تغيير المحافظة</button>
    <header style="text-align:center; padding: 20px;">
        <h1 id="cityName"></h1>
        <input type="text" id="searchInput" placeholder="🔍 بحث عن إعلان..." onkeyup="searchAds()">
        <button style="width:auto; padding: 10px 30px;" onclick="showPage('pAdd')">+ نشر إعلان جديد</button>
    </header>
    <div class="grid" id="mainGrid"></div>
    <div style="text-align:center; margin-top:50px;"><span style="cursor:pointer; color:#888; font-size:12px;" onclick="checkAdmin()">لوحة التحكم</span></div>
</div>

<div id="pAdd" class="page">
    <button style="background:#555" onclick="showPage('p1')">← إلغاء</button>
    <h3>إضافة إعلان في <span id="addCityName"></span></h3>
    <input type="text" id="iName" placeholder="الاسم الكامل">
    <input type="tel" id="iPhone" placeholder="رقم الهاتف">
    <input type="text" id="iTitle" placeholder="عنوان الإعلان">
    <input type="file" id="iImg1"><input type="file" id="iImg2"><input type="file" id="iImg3">
    <select id="iCat" onchange="updateSubs()"><option value="">اختر الفئة</option></select>
    <select id="iSub"><option value="">اختر المنتج</option></select>
    <div style="display:flex; gap:5px;">
        <input type="number" id="iPrice" placeholder="السعر">
        <select id="iCurr"><option value="$">دولار ($)</option><option value="ل.س">ليرة سورية</option></select>
    </div>
    <input type="password" id="iPass" placeholder="كلمة سر الحذف">
    <textarea id="iDesc" placeholder="وصف الإعلان"></textarea>
    <button onclick="publish()">نشر الإعلان الآن</button>
</div>

<div id="p2" class="page"><button style="background:#555" onclick="showPage('p1')">← رجوع</button><h2 id="catName"></h2><div class="grid" id="subGrid"></div></div>
<div id="p3" class="page"><button style="background:#555" onclick="showPage('p2')">← رجوع</button><h2 id="subName"></h2><div id="adList"></div></div>
<div id="pAdmin" class="page"><button style="background:#555" onclick="showPage('p1')">← خروج</button><h2>إعلانات قيد المراجعة</h2><div id="adminAds"></div></div>

<script type="module">
    import { getDocs, deleteDoc, doc, addDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
    
    const cities = ["دمشق", "حلب", "حمص", "اللاذقية", "طرطوس", "حماة", "دير الزور", "الرقة", "إدلب", "السويداء", "درعا", "القنيطرة", "الحسكة"];
    const data = {
        "عقارات": {e: "🏠", subs: ["شقق", "فلل", "أراضي"]}, "مركبات": {e: "🚗", subs: ["سيارات", "شاحنات", "دراجات"]},
        "إلكترونيات": {e: "📱", subs: ["موبايلات", "لابتوبات"]}, "أثاث": {e: "🛋️", subs: ["غرف نوم", "مطابخ"]},
        "حيوانات": {e: "🐾", subs: ["طيور", "كلاب", "قطط"]}, "أغذية": {e: "🍎", subs: ["خضروات", "فواكه"]},
        "خدمات": {e: "🛠️", subs: ["صيانة", "نقل"]}, "أزياء": {e: "👕", subs: ["ملابس", "ساعات"]},
        "ترفيه": {e: "🎮", subs: ["ألعاب", "معدات"]}, "صناعة": {e: "⚙️", subs: ["حديد", "أخشاب"]}
    };
    
    let currentCity = "";

    // بناء المحافظات
    cities.forEach(c => document.getElementById('cityGrid').innerHTML += `<div class="card" onclick="selectCity('${c}')"><h3>${c}</h3></div>`);

    window.selectCity = (c) => {
        currentCity = c;
        document.getElementById('cityName').innerText = c;
        document.getElementById('addCityName').innerText = c;
        const mainGrid = document.getElementById('mainGrid'); mainGrid.innerHTML = "";
        const iCat = document.getElementById('iCat'); iCat.innerHTML = '<option value="">اختر الفئة</option>';
        for(let cat in data) {
            mainGrid.innerHTML += `<div class="card" onclick="openP2('${cat}')"><div class="emoji" style="font-size:2.5rem">${data[cat].e}</div><h3>${cat}</h3></div>`;
            iCat.innerHTML += `<option value="${cat}">${cat}</option>`;
        }
        showPage('p1');
    };

    window.updateSubs = () => {
        const s = document.getElementById('iSub'); s.innerHTML = "";
        data[document.getElementById('iCat').value].subs.forEach(sub => s.innerHTML += `<option value="${sub}">${sub}</option>`);
    };

    window.openP2 = (cat) => {
        document.getElementById('catName').innerText = cat;
        const grid = document.getElementById('subGrid'); grid.innerHTML = "";
        data[cat].subs.forEach(s => grid.innerHTML += `<div class="card" onclick="openP3('${s}')"><h4>${s}</h4></div>`);
        showPage('p2');
    };

    window.openP3 = async (sub) => {
        document.getElementById('subName').innerText = sub;
        const list = document.getElementById('adList'); list.innerHTML = "جاري التحميل...";
        const snap = await getDocs(window.colRef);
        list.innerHTML = "";
        snap.forEach(d => {
            const a = d.data();
            if(a.city === currentCity && a.sub == sub && a.status === 'approved') {
                updateDoc(doc(window.db, "ads", d.id), { views: increment(1) });
                let imgs = a.images ? a.images.map(i => `<img src="${i}" class="ad-img">`).join('') : "";
                let date = a.timestamp ? new Date(a.timestamp.seconds * 1000).toLocaleDateString('ar-SY') : "منذ فترة";
                list.innerHTML += `<div class="ad-box ${a.featured ? 'featured' : ''}">${imgs}<h4>${a.title}</h4><p>${a.desc}</p><small>السعر: ${a.price} ${a.curr} | 👀 ${a.views || 0} | ${date}</small><br><button class="del-btn" onclick="delAd('${d.id}', '${a.pass}')">حذف</button> <button onclick="editAd('${d.id}', '${a.pass}')">تعديل</button> <button onclick="shareAd('${a.title}')">مشاركة</button></div>`;
            }
        });
        showPage('p3');
    };

    window.publish = async () => {
        if(!document.getElementById('iName').value || !document.getElementById('iPhone').value || !document.getElementById('iTitle').value || !document.getElementById('iCat').value || !document.getElementById('iSub').value || !document.getElementById('iPrice').value || !document.getElementById('iPass').value || !document.getElementById('iDesc').value) {
            alert("⚠️ يرجى تعبئة كافة الحقول المطلوبة!"); return;
        }
        const getBase64 = (f) => new Promise(res => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(f); });
        const imgs = [];
        if(document.getElementById('iImg1').files[0]) imgs.push(await getBase64(document.getElementById('iImg1').files[0]));
        if(document.getElementById('iImg2').files[0]) imgs.push(await getBase64(document.getElementById('iImg2').files[0]));
        if(document.getElementById('iImg3').files[0]) imgs.push(await getBase64(document.getElementById('iImg3').files[0]));
        if(imgs.length === 0) { alert("⚠️ يجب اختيار صورة واحدة على الأقل!"); return; }

        await addDoc(window.colRef, {
            city: currentCity, name: document.getElementById('iName').value, phone: document.getElementById('iPhone').value, title: document.getElementById('iTitle').value,
            sub: document.getElementById('iSub').value, desc: document.getElementById('iDesc').value, price: document.getElementById('iPrice').value,
            curr: document.getElementById('iCurr').value, images: imgs, pass: document.getElementById('iPass').value,
            status: 'pending', views: 0, featured: false, timestamp: new Date()
        });
        alert("✅ تم إرسال إعلانك للمراجعة!"); location.reload();
    };

    window.checkAdmin = () => {
        if(prompt("كلمة سر الإدارة:") === "2008n2008M") {
            showPage('pAdmin');
            const container = document.getElementById('adminAds');
            getDocs(window.colRef).then(snap => {
                container.innerHTML = "";
                snap.forEach(d => {
                    const a = d.data();
                    if(a.status === 'pending') {
                        let imgs = a.images ? a.images.map(i => `<img src="${i}" class="ad-img">`).join('') : "";
                        container.innerHTML += `<div class="ad-box"><h3>${a.title}</h3>${imgs}<p>${a.desc}</p>
                        <button onclick="updateAd('${d.id}', 'approved')">قبول ونشر</button>
                        <button onclick="toggleFeatured('${d.id}', ${a.featured})">تبديل التميز</button>
                        <button style="background:#c0392b" onclick="rejectAd('${d.id}')">رفض</button></div>`;
                    }
                });
            });
        }
    };

    window.toggleFeatured = async (id, status) => { await updateDoc(doc(window.db, "ads", id), { featured: !status }); location.reload(); };
    window.editAd = async (id, oldPass) => { const p = prompt("كلمة السر:"); if(p == oldPass) { const n = prompt("الوصف الجديد:"); if(n) await updateDoc(doc(window.db, "ads", id), { desc: n }); location.reload(); } };
    window.updateAd = async (id, status) => { await updateDoc(doc(window.db, "ads", id), { status: status }); location.reload(); };
    window.rejectAd = async (id) => { const r = prompt("سبب الرفض:"); if(r) { await updateDoc(doc(window.db, "ads", id), { status: 'rejected', reason: r }); location.reload(); } };
    window.delAd = async (id, pass) => { const p = prompt("كلمة سر الحذف:"); if(p == pass) { await deleteDoc(doc(window.db, "ads", id)); location.reload(); } };
    window.shareAd = (title) => { if(navigator.share) navigator.share({title: title, url: window.location.href}); };
    window.showPage = (id) => { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); };
    window.searchAds = () => { const input = document.getElementById('searchInput').value.toUpperCase(); document.querySelectorAll('.ad-box').forEach(b => b.style.display = b.innerText.toUpperCase().includes(input) ? "" : "none"); };
</script>
</body>
</html>
