<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مزاد دمشق</title>
    <style>
        body { background-color: #121212; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .page { display: none; }
        .active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .box { background: #1e1e1e; padding: 15px; border-radius: 12px; border: 1px solid #333; text-align: center; cursor: pointer; transition: 0.3s; }
        .box:hover { background: #333; border-color: #bb86fc; }
        .icon { display: block; font-size: 24px; margin-bottom: 5px; }
        h3 { color: #bb86fc; margin-top: 25px; border-right: 4px solid #bb86fc; padding-right: 10px; }
    </style>
</head>
<body>

    <!-- الصفحة الرئيسية -->
    <div id="main-page" class="page active">
        <header style="text-align: center;"><h1>مزاد دمشق</h1></header>
        <div id="categories-container"></div>
    </div>

    <!-- صفحة التفاصيل -->
    <div id="details-page" class="page">
        <button onclick="showMain()" style="padding:10px; border-radius:8px; border:none; cursor:pointer;">⬅️ رجوع</button>
        <h2 id="cat-title"></h2>
        <div id="sub-categories" class="grid"></div>
    </div>

    <script>
        const categories = {
            "عقارات": {
                "سكني للبيع": "🏠", "أراضي": "🏗️", "أثاث": "🛋️", "سكني للإيجار": "🔑", "تجاري للبيع": "🏢", "تجاري للإيجار": "🏬"
            },
            "مركبات": {
                "سيارات": "🚗", "معارض": "🏪", "إيجار": "📅", "دراجات": "🏍️", "قطع غيار": "⚙️", "خدمات سيارات": "🛠️", "أدوات بحرية": "🚤", "معدات ثقيلة": "🚜"
            },
            "خدمات": {
                "مكافحة حشرات": "🐜", "تكييف": "❄️", "تنظيف": "🧹", "مناسبات": "🎉", "مقاولات": "🏗️", "نقل أثاث": "🚚", "توصيل": "📦", "ديكور": "🎨", "حدائق": "🌳", "تعليم": "🎓", "بيع مشاريع": "📈", "صيانة": "🔧", "خدمات تجارية": "💼"
            },
            "إلكترونيات": {
                "هواتف": "📱", "إلكترونيات": "💻", "أجهزة منزلية": "🏠", "كاميرات": "📷", "ألعاب": "🎮"
            },
            "الحيوانات": { "حيوانات وطيور": "🐾" }
        };

        const container = document.getElementById('categories-container');
        
        // بناء الصفحة الرئيسية تلقائياً
        for (let group in categories) {
            container.innerHTML += `<h3>${group}</h3><div class="grid" id="group-${group}"></div>`;
            for (let name in categories[group]) {
                document.getElementById(`group-${group}`).innerHTML += `
                    <div class="box" onclick="loadDetails('${name}')">
                        <span class="icon">${categories[group][name]}</span>${name}
                    </div>`;
            }
        }

        function loadDetails(name) {
            document.getElementById('cat-title').innerText = name;
            document.getElementById('main-page').className = 'page';
            document.getElementById('details-page').className = 'page active';
        }

        function showMain() {
            document.getElementById('details-page').className = 'page';
            document.getElementById('main-page').className = 'page active';
        }
    </script>
</body>
</html>
