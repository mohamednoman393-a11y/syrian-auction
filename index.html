<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مزاد دمشق | المنصة الشاملة</title>
    <style>
        :root { --primary: #c2185b; --bg: #121212; --card: #1e1e1e; --text: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
        .page { display: none; padding: 15px; } .active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 10px; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #333; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--primary); }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { cursor: pointer; text-align: center; font-size: 12px; }
        .add-btn { background: var(--primary); width: 60px; height: 60px; border-radius: 50%; margin-top: -35px; display: flex; align-items: center; justify-content: center; font-size: 35px; color: white; box-shadow: 0 4px 15px rgba(194, 24, 91, 0.4); }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #2b2b2b; color: white; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; }
        .btn-full { background: var(--primary); color: white; padding: 15px; border-radius: 8px; width: 100%; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<!-- 1. الرئيسية -->
<div id="p1" class="page active">
    <h1>مزاد دمشق 🇸🇾</h1>
    <div class="grid" id="mainGrid"></div>
</div>

<!-- 2. الأقسام الفرعية -->
<div id="p2" class="page">
    <button onclick="showPage('p1')">⬅️ عودة</button>
    <h2 id="catName"></h2>
    <div class="grid" id="subGrid"></div>
</div>

<!-- 3. الإضافة (إلزامية البيانات) -->
<div id="p3" class="page">
    <button onclick="showPage('p1')">⬅️ إلغاء</button>
    <h2>➕ نشر إعلان جديد 📢</h2>
    <input type="text" id="iTitle" placeholder="عنوان الإعلان">
    <textarea id="iDesc" placeholder="وصف المنتج بالتفصيل"></textarea>
    <input type="number" id="iPrice" placeholder="السعر">
    <select id="iCurr"><option>دولار ($)</option><option>ليرة سورية (SYP)</option></select>
    <select id="iCity"><option>اختر المحافظة 📍</option><option>دمشق</option><option>حلب</option><option>حمص</option><option>حماة</option><option>اللاذقية</option><option>طرطوس</option><option>دير الزور</option><option>الرقة</option><option>إدلب</option><option>الحسكة</option><option>درعا</option><option>السويداء</option><option>القنيطرة</option></select>
    <input type="file" multiple accept="image/*,video/*">
    <button class="btn-full" onclick="submitAd()">نشر الإعلان 🚀</button>
</div>

<!-- 4. غرفة التحكم (للإدارة فقط) -->
<div id="p4" class="page">
    <button onclick="showPage('p1')">⬅️ عودة</button>
    <h2>⚙️ غرفة التحكم (أدمن) 🛡️</h2>
    <div id="adminPanel"></div>
</div>

<!-- التنقل السفلي -->
<div class="nav-bar">
    <div class="nav-item" onclick="showPage('p1')">🏠<br>الرئيسية</div>
    <div class="nav-item add-btn" onclick="showPage('p3')">+</div>
    <div class="nav-item" onclick="showPage('p4')">⚙️<br>الإدارة</div>
</div>

<script>
    const data = {
        "عقارات": ["فلل", "شقق", "أراضي سكنية", "تجارية", "زراعية", "عمارات", "مكاتب", "محلات", "شاليهات", "استراحات", "مخازن", "مزارع"],
        "مركبات": ["سيدان", "دفع رباعي", "عائلية", "رياضية", "شاحنات", "دراجات", "قوارب", "معدات", "قطع غيار", "إكسسوارات", "لوحات", "أخرى"],
        "إلكترونيات": ["آيفون", "أندرويد", "تابلت", "ساعات", "سماعات", "لابتوب", "كمبيوتر", "كاميرات", "مراقبة", "ألعاب", "أشرطة", "شاشات"],
        "خدمات": ["برمجة", "تصميم", "ترجمة", "تسويق", "تنظيف", "صيانة", "شحن", "توصيل", "حفلات", "وظائف", "باحثون", "استشارات"]
    };

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function submitAd() {
        if(!document.getElementById('iTitle').value || !document.getElementById('iPrice').value || document.getElementById('iCity').value === "اختر المحافظة 📍") {
            alert("⚠️ الرجاء تعبئة جميع الخانات المطلوبة!");
            return;
        }
        alert("✅ تم إرسال إعلانك! إعلانك الآن قيد المراجعة.");
        const panel = document.getElementById('adminPanel');
        panel.innerHTML += `<div class="card">طلب جديد: ${document.getElementById('iTitle').value}<br><button onclick="this.parentElement.remove(); alert('تم النشر! 🎉')">موافقة</button></div>`;
        showPage('p1');
    }

    // بناء الواجهة
    const mainGrid = document.getElementById('mainGrid');
    for(let cat in data) {
        mainGrid.innerHTML += `<div class="card" onclick="openSubs('${cat}')"><h3>${cat}</h3></div>`;
    }

    function openSubs(cat) {
        document.getElementById('catTitle').innerText = cat;
        const subGrid = document.getElementById('subGrid'); subGrid.innerHTML = "";
        data[cat].forEach(sub => subGrid.innerHTML += `<div class="card" onclick="alert('فتح إعلانات: ${sub}')"><h4>${sub}</h4></div>`);
        showPage('p2');
    }
</script>
</body>
</html>
