<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مزاد دمشق</title>
    <style>
        body { background-color: #121212; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .page { display: none; }
        .active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .box { background: #1e1e1e; padding: 15px; border-radius: 12px; border: 1px solid #333; text-align: center; cursor: pointer; transition: 0.3s; }
        .box:hover { background: #333; border-color: #bb86fc; }
        .icon { display: block; font-size: 24px; margin-bottom: 5px; }
        .filter-btn { background: #333; padding: 8px 15px; border-radius: 20px; margin: 5px; display: inline-block; border: 1px solid #555; }
        h3 { color: #bb86fc; margin-top: 25px; border-right: 4px solid #bb86fc; padding-right: 10px; }
    </style>
</head>
<body>

    <div id="main-page" class="page active">
        <header style="text-align: center;"><h1>مزاد دمشق</h1></header>
        <div id="categories-container"></div>
    </div>

    <div id="details-page" class="page">
        <button onclick="showMain()" style="background:#333; color:white; padding:10px; border-radius:8px; border:none; cursor:pointer;">⬅️ رجوع</button>
        <h2 id="cat-title"></h2>
        <div id="filters-container"></div>
        <h3>الأقسام الفرعية</h3>
        <div id="sub-categories" class="grid"></div>
    </div>

    <script>
        const appData = {
            "عقارات": {
                "سكني للبيع": {icon:"🏠", filters:["للبيع","مطلوب","للبدل"], subs:["فلل","أبراج","شقق","بيوت شعبية"]},
                "أراضي": {icon:"🏗️", filters:["للبيع","للإيجار"], subs:["سكنية","زراعية","صناعية","تجارية"]},
                "أثاث": {icon:"🛋️", filters:["للبيع","مطلوب"], subs:["طاولات","غرف نوم","إضاءة","سجاد"]},
                "سكني للإيجار": {icon:"🔑", filters:["للإيجار","مطلوب"], subs:["شقق","فلل","استوديو"]},
                "تجاري للبيع": {icon:"🏢", filters:["للبيع","مطلوب"], subs:["مكاتب","محلات","مستودعات"]},
                "تجاري للإيجار": {icon:"🏬", filters:["للإيجار","مطلوب"], subs:["مكاتب","محلات","مستودعات"]}
            },
            "مركبات": {
                "سيارات": {icon:"🚗", filters:["جديد","مستعمل"], subs:["سيدان","عائلية","رياضية","دفع رباعي"]},
                "معارض": {icon:"🏪", filters:["عرض","مطلوب"], subs:["معارض سيارات"]},
                "إيجار": {icon:"📅", filters:["يومي","شهري"], subs:["سياحية","اقتصادية"]},
                "دراجات": {icon:"🏍️", filters:["بيع","صيانة"], subs:["نارية","هوائية"]},
                "قطع غيار": {icon:"⚙️", filters:["أصلي","تجاري"], subs:["محركات","إطارات"]},
                "خدمات سيارات": {icon:"🛠️", filters:["صيانة","غسيل"], subs:["كهرباء","ميكانيك"]},
                "أدوات بحرية": {icon:"🚤", filters:["للبيع","تأجير"], subs:["قوارب","معدات غوص"]},
                "معدات ثقيلة": {icon:"🚜", filters:["للبيع","مطلوب"], subs:["رافعات","جرافات"]}
            },
            "خدمات": {
                "مكافحة حشرات": {icon:"🐜", filters:["منزلي","تجاري"], subs:["رش","تعقيم"]},
                "تكييف": {icon:"❄️", filters:["تركيب","صيانة"], subs:["سبليت","مركزي"]},
                "تنظيف": {icon:"🧹", filters:["يومي","دوري"], subs:["منازل","مكاتب"]},
                "مناسبات": {icon:"🎉", filters:["تجهيز","تصوير"], subs:["قاعات","تنسيق"]},
                "مقاولات": {icon:"🏗️", filters:["بناء","ترميم"], subs:["هيكل","تشطيب"]},
                "نقل أثاث": {icon:"🚚", filters:["داخلي","خارجي"], subs:["فك","تركيب"]},
                "توصيل": {icon:"📦", filters:["سريع","عادي"], subs:["طرود","طلبات"]},
                "ديكور": {icon:"🎨", filters:["تصميم","تنفيذ"], subs:["داخلي","خارجي"]},
                "حدائق": {icon:"🌳", filters:["تنسيق","صيانة"], subs:["أشجار","عشب"]},
                "تعليم": {icon:"🎓", filters:["دروس","معاهد"], subs:["لغات","تقوية"]},
                "بيع مشاريع": {icon:"📈", filters:["استثمار","تجارة"], subs:["مشاريع قائمة","ناشئة"]},
                "صيانة": {icon:"🔧", filters:["كهرباء","سباكة"], subs:["أعطال","تركيبات"]},
                "خدمات تجارية": {icon:"💼", filters:["تأسيس","استشارات"], subs:["تراخيص","تسويق"]}
            },
            "إلكترونيات": {
                "هواتف": {icon:"📱", filters:["جديد","مستعمل"], subs:["أيفون","سامسونج","هواوي"]},
                "إلكترونيات": {icon:"💻", filters:["جديد","مستعمل"], subs:["لابتوب","اكسسوارات"]},
                "أجهزة منزلية": {icon:"🏠", filters:["بيع","صيانة"], subs:["برادات","غسالات"]},
                "كاميرات": {icon:"📷", filters:["احترافية","عادية"], subs:["تصوير","عدسات"]},
                "ألعاب": {icon:"🎮", filters:["جديد","مستعمل"], subs:["بلايستيشن","إكس بوكس"]}
            },
            "حيوانات": {
                "طيور وحيوانات": {icon:"🐾", filters:["بيع","تبني"], subs:["طيور","قطط","كلاب"]}
            }
        };

        const container = document.getElementById('categories-container');
        for (let group in appData) {
            container.innerHTML += `<h3>${group}</h3><div class="grid" id="group-${group}"></div>`;
            for (let name in appData[group]) {
                document.getElementById(`group-${group}`).innerHTML += `
                    <div class="box" onclick="loadDetails('${name}')">
                        <span class="icon">${appData[group][name].icon}</span>${name}
                    </div>`;
            }
        }

        function loadDetails(name) {
            document.getElementById('cat-title').innerText = name;
            let found = null;
            for(let g in appData) { if(appData[g][name]) found = appData[g][name]; }
            document.getElementById('filters-container').innerHTML = found.filters.map(f => `<span class="filter-btn">${f}</span>`).join('');
            document.getElementById('sub-categories').innerHTML = found.subs.map(s => `<div class="box">${s}</div>`).join('');
            document.getElementById('main-page').className = 'page';
            document.getElementById('details-page').className = 'page active';
        }

        function showMain() {
            document.getElementById('details-page').className = 'page';
            document.getElementById('main-page').className = 'page active';
        }
    </script>
</body>
</html>
