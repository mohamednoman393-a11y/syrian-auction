<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مزاد دمشق | المنصة الشاملة</title>
    <style>
        :root { --primary: #c2185b; --bg: #121212; --card: #1e1e1e; --text: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 70px; }
        /* نظام التبويب (4 صفحات) */
        .page { display: none; padding: 15px; } .active { display: block; }
        /* تصميم المربعات (مثل مزاد قطر) */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; min-height: 150px; display: flex; flex-direction: column; justify-content: flex-end; cursor: pointer; transition: 0.3s; }
        /* شريط التنقل السفلي */
        .navbar { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; }
        .nav-item { text-align: center; font-size: 12px; cursor: pointer; }
        .add-btn { background: var(--primary); width: 50px; height: 50px; border-radius: 50%; margin-top: -30px; display: flex; align-items: center; justify-content: center; font-size: 30px; }
    </style>
</head>
<body>

<!-- الصفحات -->
<div id="p1" class="page active">
    <h1>مزاد دمشق 🇸🇾</h1>
    <div class="grid" id="mainCats"></div>
</div>

<div id="p2" class="page">
    <button onclick="showPage('p1')">⬅️ عودة</button>
    <h2 id="catName"></h2>
    <div class="grid" id="subGrid"></div>
</div>

<div id="p3" class="page">
    <h2>➕ إضافة إعلان جديد</h2>
    <input type="text" placeholder="عنوان الإعلان" style="width:90%; padding:10px;">
    <input type="file" multiple accept="image/*,video/*">
    <button style="background:var(--primary); width:100%; padding:15px; border:none; color:white;">نشر الآن</button>
</div>

<div id="p4" class="page">
    <h2>⚙️ غرفة التحكم (أدمن)</h2>
    <div id="adminAds"></div>
</div>

<!-- شريط التنقل السفلي -->
<div class="navbar">
    <div class="nav-item" onclick="showPage('p1')">🏠<br>الرئيسية</div>
    <div class="nav-item" onclick="alert('المزايدات الحية')">🔨<br>مزايدة</div>
    <div class="nav-item add-btn" onclick="showPage('p3')">+</div>
    <div class="nav-item" onclick="alert('إعلاناتي')">👤<br>إعلاناتي</div>
    <div class="nav-item" onclick="showPage('p4')">⚙️<br>المزيد</div>
</div>

<script>
    const data = {
        "عقارات": ["فلل", "شقق سكنية", "أراضي سكنية", "تجارية", "زراعية", "عمارات", "مكاتب", "محلات", "شاليهات", "استراحات", "مخازن", "مزارع"],
        "مركبات": ["سيدان", "دفع رباعي", "عائلية", "رياضية", "كلاسيكية", "شاحنات", "دراجات", "قوارب", "معدات ثقيلة", "قطع غيار", "إكسسوارات", "لوحات"],
        "إلكترونيات": ["آيفون", "أندرويد", "تابلت", "ساعات", "سماعات", "لابتوب", "كمبيوتر", "كاميرات", "مراقبة", "ألعاب", "أشرطة", "شاشات"],
        "أثاث": ["كنب", "غرف نوم", "طعام", "مكتبي", "حدائق", "سجاد", "ستائر", "إضاءة", "لوحات", "تحف", "ديكور", "مطابخ"]
    };

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // تعبئة البيانات
    const mainGrid = document.getElementById('mainCats');
    for(let cat in data) {
        mainGrid.innerHTML += `<div class="card" onclick="openSubs('${cat}')"><h3>${cat}</h3></div>`;
    }

    function openSubs(cat) {
        document.getElementById('catName').innerText = cat;
        const subGrid = document.getElementById('subGrid'); subGrid.innerHTML = "";
        data[cat].forEach(sub => subGrid.innerHTML += `<div class="card" onclick="alert('فتح إعلانات: ${sub}')"><h4>${sub}</h4></div>`);
        showPage('p2');
    }
</script>
</body>
</html>
