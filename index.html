<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مزاد دمشق الاحترافي</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #fff; margin: 0; padding: 20px; }
        .page { display: none; } .active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; text-align: center; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: #27ae60; transform: scale(1.05); }
        .btn-nav { background: #333; padding: 10px 20px; border-radius: 8px; cursor: pointer; color: white; border: none; }
        .ad-box { background: #222; padding: 20px; border-radius: 10px; margin-bottom: 15px; border-right: 5px solid #27ae60; }
    </style>
</head>
<body>

<!-- التنقل العلوي -->
<div style="display:flex; gap:10px; margin-bottom:20px;">
    <button class="btn-nav" onclick="showPage('p1')">🏠 الرئيسية</button>
    <button class="btn-nav" onclick="showPage('p2')">📂 الأقسام</button>
    <button class="btn-nav" onclick="showPage('p3')">➕ إعلان</button>
    <button class="btn-nav" onclick="showPage('p4')" style="background:#c0392b">⚙️ التحكم</button>
</div>

<!-- 1. الرئيسية -->
<div id="p1" class="page active">
    <h1>🇸🇾 مزاد دمشق</h1>
    <div class="grid" id="mainCats"></div>
</div>

<!-- 2. الأقسام والفروع -->
<div id="p2" class="page">
    <button onclick="showPage('p1')">← عودة</button>
    <h2 id="catTitle"></h2>
    <div class="grid" id="subCats"></div>
</div>

<!-- 3. صفحة الإضافة (مع دعم وسائط) -->
<div id="p3" class="page">
    <h3>نشر إعلان جديد</h3>
    <input type="file" multiple accept="image/*,video/*" id="mediaUpload">
    <p><small>يمكنك رفع حتى 5 صور وفيديو</small></p>
    <button onclick="alert('تم رفع الوسائط!')">رفع الإعلان</button>
</div>

<!-- 4. غرفة التحكم (محمية) -->
<div id="p4" class="page">
    <input type="password" id="adminPass" placeholder="كلمة سر الأدمن">
    <button onclick="checkAdmin()">دخول الأدمن</button>
    <div id="adminArea"></div>
</div>

<script>
    const categories = {
        "عقارات": ["فلل", "شقق", "أراضي سكنية", "تجارية", "زراعية", "عمارات", "مكاتب", "محلات", "شاليهات", "استراحات", "مخازن", "مزارع"],
        "مركبات": ["سيدان", "دفع رباعي", "عائلية", "رياضية", "كلاسيكية", "شاحنات", "دراجات", "قوارب", "معدات ثقيلة", "قطع غيار", "إكسسوارات", "لوحات"],
        "إلكترونيات": ["أندرويد", "آيفون", "تابلت", "ساعات", "سماعات", "لابتوب", "كمبيوتر", "طابعات", "كاميرات", "مراقبة", "ألعاب", "شاشات"],
        "خدمات": ["برمجة", "تصميم", "ترجمة", "كتابة", "تسويق", "استشارات", "تنظيف", "صيانة", "شحن", "تنظيم حفلات", "وظائف", "باحثين عن عمل"]
    };

    window.showPage = (id) => { 
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
        document.getElementById(id).classList.add('active'); 
    };

    // عرض المربعات الرئيسية
    const mainGrid = document.getElementById('mainCats');
    for(let cat in categories) {
        mainGrid.innerHTML += `<div class="card" onclick="openSubs('${cat}')"><h3>${cat}</h3></div>`;
    }

    // عرض الفروع الـ 12
    window.openSubs = (cat) => {
        document.getElementById('catTitle').innerText = cat;
        const subGrid = document.getElementById('subCats'); subGrid.innerHTML = "";
        categories[cat].forEach(sub => subGrid.innerHTML += `<div class="card" onclick="alert('عرض إعلانات: ${sub}')"><h4>${sub}</h4></div>`);
        showPage('p2');
    };

    // غرفة التحكم المحمية
    window.checkAdmin = () => {
        if(document.getElementById('adminPass').value === "1234") {
            document.getElementById('adminArea').innerHTML = "<h3>لوحة التحكم (موافقة/رفض)</h3>";
        } else {
            alert("كلمة سر خاطئة!");
        }
    };
</script>
</body>
</html>
