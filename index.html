<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="مزاد دمشق - أكبر منصة إعلانات ومزادات في المحافظات السورية">
    <title>مزاد دمشق</title>
<style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #ffffff; margin: 0; padding: 20px; }
    .page { display: none; } .active { display: block; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-top: 20px; }
    .card { background: #1e1e1e; padding: 25px; border-radius: 15px; border: 1px solid #333; text-align: center; cursor: pointer; }
    .card:hover { transform: translateY(-5px); border-color: #27ae60; }
    .card h3 { margin: 10px 0 0; font-size: 1.2rem; }
    .emoji { font-size: 2.5rem; }
    input, select, textarea { width: 100%; padding: 15px; margin: 10px 0; background: #2b2b2b !important; color: #fff; border: 1px solid #444; border-radius: 10px; }
    button { background: #27ae60; color: white; padding: 15px; border: none; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
    .ad-box { background: #1e1e1e; padding: 20px; margin-bottom: 15px; border-radius: 10px; border-right: 5px solid #27ae60; }
</style>
</head>
<body>
    <h1>مزاد دمشق</h1>
    <div id="content" class="page active">
        <div class="grid">
            <div class="card">
                <div class="emoji">🚗</div>
                <h3>سيارات</h3>
            </div>
            <div class="card">
                <div class="emoji">📱</div>
                <h3>موبايلات</h3>
            </div>
            <div class="card">
                <div class="emoji">🏠</div>
                <h3>عقارات</h3>
            </div>
        </div>
    </div>
</body>
</html>
