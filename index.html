<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مزاد دمشق 🇸🇾</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; margin: 0; padding: 20px; }
        .page { display: none; } .active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; border: 1px solid #333; text-align: center; cursor: pointer; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #2b2b2b; color: #fff; border: 1px solid #555; border-radius: 8px; box-sizing: border-box; }
        button { background: #27ae60; color: white; padding: 12px; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; }
        .ad-box { background: #1e1e1e; padding: 15px; margin-bottom: 15px; border-radius: 10px; border-right: 5px solid #27ae60; }
        .del-btn { background: #c0392b; margin-top: 10px; font-size: 12px; border: none; padding: 5px; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div id="p1" class="page active">
    <h1>🇸🇾 مزاد دمشق</h1>
    <button onclick="showPage('pAdd')">+ نشر إعلان جديد</button>
    <div class="grid" id="mainGrid"></div>
</div>

<div id="pAdd" class="page">
    <h3>إضافة إعلان</h3>
    <input type="text" id="iTitle" placeholder="عنوان الإعلان">
    <input type="text" id="iCat" placeholder="الفئة (مثال: عقارات)">
    <input type="password" id="iPass" placeholder="كلمة سر الحذف">
    <textarea id="iDesc" placeholder="الوصف"></textarea>
    <button onclick="publish()">نشر الإعلان</button>
    <button style="background:#555" onclick="showPage('p1')">إلغاء</button>
</div>

<div id="p3" class="page">
    <button onclick="showPage('p1')">← رجوع</button>
    <div id="adList"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAvdxlQipjpSDcwex5Ucc0KXSw07RO2mPE",
        authDomain: "gg55-9a884.firebaseapp.com",
        projectId: "gg55-9a884",
        storageBucket: "gg55-9a884.firebasestorage.app",
        messagingSenderId: "82936706158",
        appId: "1:82936706158:web:36e00ec48e134f5205227f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.publish = async () => {
        const title = document.getElementById('iTitle').value;
        const cat = document.getElementById('iCat').value;
        const pass = document.getElementById('iPass').value;
        const desc = document.getElementById('iDesc').value;

        if(!title || !pass) return alert("يرجى تعبئة العنوان وكلمة السر");
        
        await addDoc(collection(db, "ads"), { title, cat, pass, desc });
        alert("✅ تم النشر!");
        location.reload();
    };

    window.showPage = (id) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    async function loadAds() {
        const querySnapshot = await getDocs(collection(db, "ads"));
        const list = document.getElementById('adList');
        list.innerHTML = "";
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            list.innerHTML += `<div class="ad-box"><h4>${data.title}</h4><p>${data.desc}</p><button class="del-btn" onclick="delAd('${doc.id}', '${data.pass}')">حذف</button></div>`;
        });
    }

    window.delAd = async (id, pass) => {
        const inputPass = prompt("كلمة سر الحذف:");
        if(inputPass === pass) {
            await deleteDoc(doc(db, "ads", id));
            location.reload();
        } else { alert("خطأ!"); }
    };

    loadAds();
</script>
</body>
</html>
