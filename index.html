<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مزاد دمشق</title>
    <style>
        :root { --bg: #121212; --text: #fff; --accent: #bb86fc; }
        body.light { --bg: #f5f5f5; --text: #121212; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .page { display: none; padding: 15px; }
        .active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .box { background: #1e1e1e; padding: 15px; border-radius: 12px; cursor: pointer; text-align: center; border: 1px solid #333; }
        .navbar { position: fixed; bottom: 0; width: 100%; background: #1e1e1e; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .ad-item { background: #333; padding: 15px; margin: 10px 0; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- 1. الرئيسية -->
    <div id="home" class="page active">
        <h1>الرئيسية</h1>
        <div id="cats-grid" class="grid"></div>
    </div>
    
    <!-- 2. الفروع -->
    <div id="subs" class="page">
        <h2 id="subs-title"></h2>
        <div id="subs-grid" class="grid"></div>
    </div>

    <!-- 3. قائمة الإعلانات -->
    <div id="ads" class="page">
        <h2 id="ads-title">الإعلانات</h2>
        <div id="ads-list"></div>
    </div>

    <!-- 4. تفاصيل الإعلان -->
    <div id="details" class="page">
        <h2>تفاصيل الإعلان</h2>
        <div class="box"><h3>إعلان تجريبي</h3><p>مواصفات السلعة...</p></div>
    </div>

    <!-- 5. الإعدادات -->
    <div id="settings" class="page">
        <h2>الإعدادات</h2>
        <button onclick="document.body.classList.toggle('light')">تبديل اللون (أسود/أبيض)</button>
        <button onclick="alert('اللغة: العربية')">تغيير اللغة</button>
        <div onclick="openAdmin()" style="color:var(--accent); cursor:pointer; margin-top:20px;">M - غرفة التحكم</div>
    </div>

    <div class="navbar">
        <div onclick="show('home')">🏠 الرئيسية</div>
        <div onclick="show('add-ad')">➕ إضافة</div>
        <div onclick="show('settings')">⚙️ الإعدادات</div>
    </div>

    <script>
        const cats = {
            "سكني للبيع":"🏠", "أراضي":"🏗️", "أثاث":"🛋️", "سكني للإيجار":"🔑", "تجاري للبيع":"🏢", 
            "تجاري للإيجار":"🏬", "سيارات":"🚗", "معارض سيارات":"🏪", "إيجار سيارات":"📅", "دراجات":"🏍️", 
            "قطع غيار":"⚙️", "خدمات سيارات":"🛠️", "أدوات بحرية":"🚤", "معدات ثقيلة":"🚜", "مبيدات حشرات":"🐜", 
            "تكييف":"❄️", "تنظيف":"🧹", "مناسبات":"🎉", "مقاولات":"🏗️", "نقل أثاث":"🚚", "توصيل":"📦", 
            "ديكور":"🎨", "حدائق":"🌳", "تعليم":"🎓", "بيع مشاريع":"📈", "صيانة":"🔧", "خدمات تجارية":"💼", 
            "هواتف":"📱", "إلكترونيات":"💻", "أجهزة منزلية":"🏠", "حيوانات":"🐾"
        };

        // 1. بناء الرئيسية
        const grid = document.getElementById('cats-grid');
        for(let name in cats) {
            grid.innerHTML += `<div class="box" onclick="openSubs('${name}')"><span>${cats[name]}</span><br>${name}</div>`;
        }

        // 2. التنقل بين الصفحات
        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // 3. فتح الفروع
        function openSubs(name) {
            document.getElementById('subs-title').innerText = name;
            const subsGrid = document.getElementById('subs-grid');
            subsGrid.innerHTML = `<div class="box" onclick="openAds('فرع 1')">فرع 1</div><div class="box" onclick="openAds('فرع 2')">فرع 2</div>`;
            show('subs');
        }

        // 4. عرض الإعلانات
        function openAds(subName) {
            document.getElementById('ads-title').innerText = subName;
            const list = document.getElementById('ads-list');
            list.innerHTML = `<div class="ad-item" onclick="show('details')">إعلان 1 - اضغط للمشاهدة</div>`;
            show('ads');
        }

        // 5. غرفة التحكم
        function openAdmin() {
            if(prompt("كلمة السر:") === "2008n2008M") alert("تم الوصول لغرفة التحكم");
        }
    </script>
</body>
</html>
