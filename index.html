<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مزاد دمشق | منصة شاملة</title>
    <style>
        :root { --primary: #27ae60; --dark: #121212; --light: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--light); margin: 0; padding: 0; }
        .page { display: none; padding: 20px; } .active { display: block; }
        nav { background: #1a1a1a; padding: 15px; display: flex; justify-content: space-around; position: sticky; top: 0; z-index: 100; }
        .btn { background: var(--primary); color: white; padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 12px; border: 1px solid #333; text-align: center; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .ad-box { background: #222; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-right: 5px solid var(--primary); }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #2b2b2b; color: white; border: 1px solid #444; border-radius: 8px; }
    </style>
</head>
<body>

<nav>
    <button class="btn" onclick="showPage('p1')">🏠 الرئيسية</button>
    <button class="btn" onclick="showPage('p2')">📂 التصنيفات</button>
    <button class="btn" onclick="showPage('p3')">➕ إعلان جديد</button>
    <button class="btn" style="background:#c0392b" onclick="adminLogin()">⚙️ غرفة التحكم</button>
</nav>

<!-- 1. الرئيسية -->
<div id="p1" class="page active">
    <h1>🇸🇾 مزاد دمشق</h1>
    <p>أضخم منصة مزادات في سوريا. تصفح، شارك، وبع بأمان.</p>
    <div id="mainGrid" class="grid"></div>
</div>

<!-- 2. التصنيفات -->
<div id="p2" class="page">
    <h2 id="catTitle">التصنيفات الشاملة</h2>
    <div id="catGrid" class="grid"></div>
</div>

<!-- 3. إضافة إعلان -->
<div id="p3" class="page">
    <h2>نشر إعلان احترافي</h2>
    <input type="text" id="iTitle" placeholder="عنوان الإعلان">
    <select id="iCat"></select>
    <input type="file" multiple accept="image/*,video/*">
    <textarea placeholder="وصف المنتج بالتفصيل..."></textarea>
    <button class="btn" style="width:100%" onclick="alert('تم رفع الإعلان للمراجعة')">نشر الإعلان</button>
</div>

<script>
    const data = {
        "عقارات": ["شقق", "فلل", "أراضي", "مكاتب", "مزارع", "شاليهات", "مستودعات", "محلات", "عمارات", "أجنحة", "استراحات", "مخازن"],
        "مركبات": ["سيدان", "دفع رباعي", "عائلية", "رياضية", "كلاسيكية", "شاحنات", "دراجات", "قوارب", "معدات ثقيلة", "قطع غيار", "إكسسوارات", "لوحات"],
        "إلكترونيات": ["آيفون", "أندرويد", "تابلت", "ساعات", "لابتوب", "كمبيوتر", "كاميرات", "شاشات", "سماعات", "ألعاب", "أجهزة صوت", "طابعات"],
        "خدمات": ["برمجة", "تصميم", "ترجمة", "تسويق", "تنظيف", "صيانة", "شحن", "توصيل", "تنظيم حفلات", "وظائف", "باحثون عن عمل", "استشارات"]
    };

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // بناء الواجهة
    const mainGrid = document.getElementById('mainGrid');
    const catGrid = document.getElementById('catGrid');
    const iCat = document.getElementById('iCat');

    for(let cat in data) {
        mainGrid.innerHTML += `<div class="card" onclick="showPage('p2')"><h3>${cat}</h3></div>`;
        iCat.innerHTML += `<option>${cat}</option>`;
        data[cat].forEach(sub => {
            catGrid.innerHTML += `<div class="card" onclick="alert('عرض إعلانات ${sub}')"><h4>${sub}</h4></div>`;
        });
    }

    function adminLogin() {
        const pass = prompt("كلمة سر غرفة التحكم:");
        if(pass === "123456") {
            alert("مرحباً بك في لوحة تحكم مدير المزاد - كل الميزات متاحة!");
        } else {
            alert("غير مصرح لك بالدخول!");
        }
    }
</script>
</body>
</html>
