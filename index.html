<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="مزاد دمشق - أكبر منصة إعلانات ومزادات في المحافظات السورية">
    <title>مزاد دمشق 🇸🇾</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyAvdxlQipjpSDcwex5Ucc0KXSw07RO2mPE", authDomain: "gg55-9a884.firebaseapp.com", projectId: "gg55-9a884", storageBucket: "gg55-9a884.firebasestorage.app", messagingSenderId: "82936706158", appId: "1:82936706158:web:36e00ec48e134f5205227f" };
        window.db = getFirestore(initializeApp(firebaseConfig));
        window.colRef = collection(window.db, "ads");
    </script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #ffffff; margin: 0; padding: 20px; }
        .page { display: none; } .active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 15px; border: 1px solid #333; text-align: center; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #27ae60; }
        .card h3 { margin: 10px 0 0; font-size: 1.2rem; }
        .emoji { font-size: 2.5rem; }
        input, select, textarea { width: 100%; padding: 15px; margin: 10px 0; background: #2b2b2b !important; color: #ffffff !important; border: 2px solid #555 !important; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background: #27ae60; color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .ad-box { background: #1e1e1e; padding: 20px; margin-bottom: 15px; border-radius: 10px; border-right: 5px solid #27ae60; }
        .del-btn { background: #c0392b !important; margin-top: 10px; font-size: 12px; }
        .ad-img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; margin: 5px; }
    </style>
</head>
<body>

<div id="p1" class="page active">
    <header style="text-align:center; padding: 20px;">
        <h1>🇸🇾 مزاد دمشق</h1>
        <button style="width:auto; padding: 10px 30px;" onclick="showPage('pAdd')">+ نشر إعلان جديد</button>
    </header>
    <div class="grid" id="mainGrid"></div>
</div>

<div id="pAdd" class="page">
    <button style="background:#555" onclick="showPage('p1')">← إلغاء</button>
    <h3>إضافة إعلان جديد (يمكنك اختيار حتى 3 صور)</h3>
    <input type="text" id="iName" placeholder="الاسم الكامل">
    <input type="text" value="+963" disabled>
    <input type="tel" id="iPhone" placeholder="رقم الهاتف">
    <input type="text" id="iTitle" placeholder="عنوان الإعلان">
    <input type="file" id="iImg1" accept="image/*">
    <input type="file" id="iImg2" accept="image/*">
    <input type="file" id="iImg3" accept="image/*">
    <select id="iCat" onchange="updateSubs()"><option value="">اختر الفئة</option></select>
    <select id="iSub"><option value="">اختر المنتج</option></select>
    <div style="display:flex; gap:5px;">
        <input type="number" id="iPrice" placeholder="السعر">
        <select id="iCurr"><option value="$">دولار ($)</option><option value="ل.س">ليرة سورية</option></select>
    </div>
    <select id="iCity">
        <option value="">اختر المحافظة</option>
        <option>دمشق</option><option>ريف دمشق</option><option>حلب</option><option>حمص</option>
        <option>حماة</option><option>اللاذقية</option><option>طرطوس</option><option>إدلب</option>
        <option>دير الزور</option><option>الرقة</option><option>الحسكة</option><option>درعا</option>
        <option>السويداء</option><option>القنيطرة</option>
    </select>
    <input type="password" id="iPass" placeholder="كلمة سر الحذف (خاصة بك)">
    <textarea id="iDesc" placeholder="وصف الإعلان"></textarea>
    <button onclick="publish()">نشر الإعلان الآن</button>
</div>

<div id="p2" class="page">
    <button style="background:#555" onclick="showPage('p1')">← رجوع</button>
    <h2 id="catName"></h2>
    <div class="grid" id="subGrid"></div>
</div>

<div id="p3" class="page">
    <button style="background:#555" onclick="showPage('p2')">← رجوع للفروع</button>
    <h2 id="subName"></h2>
    <div id="adList"></div>
</div>

<script type="module">
    import { getDocs, deleteDoc, doc, addDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
    const data = {
        "عقارات": {e: "🏠", subs: ["شقق", "فلل", "أراضي"]},
        "مركبات": {e: "🚗", subs: ["سيارات", "شاحنات", "دراجات"]},
        "إلكترونيات": {e: "📱", subs: ["موبايلات", "لابتوبات"]},
        "أثاث": {e: "🛋️", subs: ["غرف نوم", "مطابخ"]},
        "حيوانات": {e: "🐾", subs: ["طيور", "كلاب", "قطط"]},
        "أغذية": {e: "🍎", subs: ["خضروات", "فواكه"]},
        "خدمات": {e: "🛠️", subs: ["صيانة", "نقل"]},
        "أزياء": {e: "👕", subs: ["ملابس", "ساعات"]},
        "ترفيه": {e: "🎮", subs: ["ألعاب", "معدات"]},
        "صناعة": {e: "⚙️", subs: ["حديد", "أخشاب"]}
    };
    
    const mainGrid = document.getElementById('mainGrid');
    const iCat = document.getElementById('iCat');
    for(let cat in data) {
        mainGrid.innerHTML += `<div class="card" onclick="openP2('${cat}')"><div class="emoji">${data[cat].e}</div><h3>${cat}</h3></div>`;
        iCat.innerHTML += `<option value="${cat}">${cat}</option>`;
    }

    window.updateSubs = () => {
        const subSelect = document.getElementById('iSub');
        subSelect.innerHTML = "";
        data[iCat.value].subs.forEach(s => subSelect.innerHTML += `<option value="${s}">${s}</option>`);
    };

    window.openP2 = (cat) => {
        document.getElementById('catName').innerText = cat;
        const grid = document.getElementById('subGrid');
        grid.innerHTML = "";
        data[cat].subs.forEach(s => grid.innerHTML += `<div class="card" onclick="openP3('${s}')"><h4>${s}</h4></div>`);
        showPage('p2');
    };

    window.openP3 = async (sub) => {
        document.getElementById('subName').innerText = sub;
        const list = document.getElementById('adList');
        list.innerHTML = "جاري التحميل...";
        const snap = await getDocs(window.colRef);
        list.innerHTML = "";
        snap.forEach((doc) => {
            const a = doc.data();
            if(a.sub == sub) {
                let imagesHtml = a.images ? a.images.map(img => `<img src="${img}" class="ad-img">`).join('') : `<img src="${a.img}" class="ad-img">`;
                list.innerHTML += `<div class="ad-box">${imagesHtml}<h4>${a.title}</h4><p>${a.desc}</p><small>السعر: ${a.price} ${a.curr}</small><br><button class="del-btn" onclick="delAd('${doc.id}', '${a.pass}')">حذف الإعلان</button></div>`;
            }
        });
        showPage('p3');
    };

    window.delAd = async (id, pass) => {
        const p = prompt("كلمة سر الحذف:");
        if(p == pass) { await deleteDoc(doc(window.db, "ads", id)); location.reload(); } else { alert("خطأ!"); }
    };

    window.publish = async () => {
        const getBase64 = (file) => new Promise((resolve) => { const reader = new FileReader(); reader.onload = () => resolve(reader.result); reader.readAsDataURL(file); });
        const imgs = [];
        if(document.getElementById('iImg1').files[0]) imgs.push(await getBase64(document.getElementById('iImg1').files[0]));
        if(document.getElementById('iImg2').files[0]) imgs.push(await getBase64(document.getElementById('iImg2').files[0]));
        if(document.getElementById('iImg3').files[0]) imgs.push(await getBase64(document.getElementById('iImg3').files[0]));
        
        if(imgs.length === 0) { alert("يجب اختيار صورة واحدة على الأقل!"); return; }

        await addDoc(window.colRef, {
            sub: document.getElementById('iSub').value, title: document.getElementById('iTitle').value,
            desc: document.getElementById('iDesc').value, price: document.getElementById('iPrice').value,
            curr: document.getElementById('iCurr').value, images: imgs, pass: document.getElementById('iPass').value
        });
        alert("تم النشر!"); location.reload();
    };

    window.showPage = (id) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };
</script>
</body>
</html>
