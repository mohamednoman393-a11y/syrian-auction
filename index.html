<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مزاد دمشق 🇸🇾</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; margin: 0; padding: 20px; }
        .page { display: none; } .active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 20px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 10px; border: 1px solid #333; text-align: center; cursor: pointer; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #2b2b2b; color: white; border: 1px solid #555; border-radius: 8px; box-sizing: border-box; }
        button { background: #27ae60; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; }
        .ad-box { background: #1e1e1e; padding: 15px; margin-bottom: 15px; border-radius: 10px; border-right: 5px solid #27ae60; }
    </style>
</head>
<body>

<!-- الصفحات -->
<div id="p1" class="page active">
    <h1>🇸🇾 مزاد دمشق</h1>
    <button onclick="showPage('pProfile')">👤 ملفي الشخصي</button>
    <button onclick="showPage('pAdd')">+ نشر إعلان</button>
    <button onclick="showPage('p4')" style="background:#e67e22">⚙️ غرفة التحكم (أدمن)</button>
    <div class="grid" id="mainGrid"></div>
</div>

<div id="p2" class="page">
    <button onclick="showPage('p1')">← رجوع</button>
    <h2 id="catName"></h2>
    <div class="grid" id="subGrid"></div>
</div>

<div id="p3" class="page">
    <button onclick="showPage('p2')">← رجوع</button>
    <h2 id="adTitle"></h2>
    <div id="adDetailsContent"></div>
</div>

<div id="p4" class="page">
    <h2>⚙️ غرفة التحكم</h2>
    <div id="adminPanel"></div>
</div>

<div id="pAdd" class="page">
    <button onclick="showPage('p1')">← إلغاء</button>
    <h3>نشر إعلان</h3>
    <input type="text" id="iName" placeholder="الاسم">
    <input type="text" id="iCode" placeholder="كودك">
    <select id="iCity"><option>اختر المحافظة</option><option>دمشق</option><option>حلب</option></select>
    <select id="iCat" onchange="updateSubs()"><option>اختر الفئة</option><option value="عقارات">عقارات</option></select>
    <select id="iSub"><option>اختر الفرع</option></select>
    <button onclick="publish()">نشر</button>
</div>

<div id="pProfile" class="page">
    <button onclick="showPage('p1')">← رجوع</button>
    <input type="text" id="pName" placeholder="الاسم">
    <input type="text" id="pCode" placeholder="الكود الشخصي">
    <button onclick="saveProfile()">حفظ الملف</button>
</div>

<script>
    const data = { "عقارات": ["شقق", "فلل"] };
    let ads = []; // محاكاة لقاعدة البيانات

    window.showPage = (id) => { 
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
        document.getElementById(id).classList.add('active'); 
    };

    // تعبئة الفئات
    const mainGrid = document.getElementById('mainGrid');
    for(let cat in data) { mainGrid.innerHTML += `<div class="card" onclick="openSubs('${cat}')"><h3>${cat}</h3></div>`; }

    window.openSubs = (cat) => {
        document.getElementById('catName').innerText = cat;
        const subGrid = document.getElementById('subGrid'); subGrid.innerHTML = "";
        data[cat].forEach(s => subGrid.innerHTML += `<div class="card" onclick="listAds('${s}')"><h4>${s}</h4></div>`);
        showPage('p2');
    };

    window.listAds = (sub) => {
        const content = document.getElementById('adDetailsContent');
        content.innerHTML = ads.filter(a => a.sub == sub && a.status == 'موافق عليه').map(a => `<div class="ad-box"><h4>${a.title}</h4><button onclick="viewAd('${a.id}')">عرض</button></div>`).join('');
        showPage('p3');
    };

    window.publish = () => {
        const name = document.getElementById('iName').value;
        const code = document.getElementById('iCode').value;
        if(!name || !code) return alert("يرجى ملء جميع الفراغات!");
        ads.push({id: Date.now(), title: document.getElementById('iSub').value, sub: document.getElementById('iSub').value, status: 'انتظار'});
        alert("تم إرسال إعلانك للمراجعة!");
        showPage('p1');
    };

    window.saveProfile = () => {
        const code = document.getElementById('pCode').value;
        if(!code) return alert("يرجى تعبئة جميع الفراغات!");
        // محاكاة التحقق من الكود
        if(code == "123") return alert("هذا الكود متوفر، يرجى اختيار كود آخر!");
        alert("تم حفظ الملف!");
    };

    // غرفة التحكم
    const adminPanel = document.getElementById('adminPanel');
    window.renderAdmin = () => {
        adminPanel.innerHTML = ads.map(a => `
            <div class="ad-box">
                <h4>${a.title}</h4>
                <button onclick="a.status='موافق عليه'; renderAdmin()">موافقة</button>
                <button onclick="a.status='مرفوض'; a.reason=prompt('سبب الرفض؟'); renderAdmin()">رفض</button>
            </div>
        `).join('');
    };
    renderAdmin();
</script>
</body>
</html>
