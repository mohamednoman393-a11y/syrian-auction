        window.db = getFirestore(initializeApp(firebaseConfig));
        window.colRef = collection(window.db, "ads");

    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; margin: 0; padding: 20px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 20px; }

        button { background: #27ae60; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; }

</head>
<body>

<div id="p1" class="page active">
    <h1>🇸🇾 مزاد دمشق</h1>
    <button onclick="showPage('pProfile')">👤 ملفي الشخصي</button>
    <button onclick="showPage('pAdd')">+ نشر إعلان</button>
    <div class="grid" id="mainGrid"></div>
</div>

<div id="p2" class="page">
    <button onclick="showPage('p1')">← رجوع</button>
    <h2 id="catName"></h2>
    <div class="grid" id="subGrid"></div>
</div>

<div id="p3" class="page">
    <button onclick="showPage('p2')">← رجوع</button>
    <h2 id="subName"></h2>
    <div id="adList"></div>
</div>

<div id="p4" class="page">
    <button onclick="showPage('p3')">← رجوع للقائمة</button>
    <div id="adDetails"></div>
</div>

<div id="pAdd" class="page">
    <button onclick="showPage('p1')">← إلغاء</button>
    <h3>نشر إعلان جديد</h3>
    <input type="text" id="iName" placeholder="الاسم الكامل">
    <input type="text" id="iCode" placeholder="كودك الشخصي">
    <select id="iCat" onchange="updateSubs()"><option value="">اختر الفئة</option></select>
    <select id="iSub"><option value="">اختر المنتج</option></select>
    <button onclick="publish()">نشر الإعلان</button>
</div>

<div id="pProfile" class="page">
    <button onclick="showPage('p1')">← رجوع</button>
    <h2>ملفك الشخصي</h2>
    <input type="text" id="pName" placeholder="الاسم">
    <input type="text" id="pCode" placeholder="كودك الشخصي">
    <button onclick="saveProfile()">حفظ</button>
</div>

<script type="module">
    // قائمة الـ 50 فئة المطلوبة
    const data = {
        "عقارات": {e: "🏠", subs: ["شقق", "فلل", "أراضي", "مكاتب", "محلات"]},
        "سيارات": {e: "🚗", subs: ["سيدان", "دفع رباعي", "شاحنات", "باصات", "دراجات"]},
        "موبايلات": {e: "📱", subs: ["آيفون", "سامسونج", "شاومي", "هواوي", "اكسسوارات"]},
        "كمبيوتر": {e: "💻", subs: ["لابتوب", "شاشات", "كيبورد", "ماوس", "قطع غيار"]},
        "أثاث": {e: "🛋️", subs: ["كنب", "غرف نوم", "طاولات", "كراسي", "مطابخ"]},
        "أدوات منزلية": {e: "🍳", subs: ["خلاطات", "غسالات", "ثلاجات", "أفران", "مكاوي"]},
        "ملابس": {e: "👕", subs: ["رجالي", "نسائي", "أطفال", "رياضة", "رسمي"]},
        "ساعات": {e: "⌚", subs: ["رولكس", "كاسيو", "ذكية", "تقليد", "جدارية"]},
        "عطور": {e: "🧴", subs: ["رجالي", "نسائي", "مجموعات", "عطور فرنسية", "عود"]},
        "حيوانات": {e: "🐾", subs: ["قطط", "كلاب", "طيور", "أسماك", "خيول"]}
    };
    
    window.showPage = (id) => { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); };
    
    const mainGrid = document.getElementById('mainGrid');
    const iCat = document.getElementById('iCat');
    for(let cat in data) {
        mainGrid.innerHTML += `<div class="card" onclick="openP2('${cat}')"><div style="font-size:30px">${data[cat].e}</div><h3>${cat}</h3></div>`;
        iCat.innerHTML += `<option value="${cat}">${cat}</option>`;
    }
    
    window.updateSubs = () => {
        const s = document.getElementById('iSub'); s.innerHTML = "";
        if(data[iCat.value]) {
            data[iCat.value].subs.forEach(sub => s.innerHTML += `<option value="${sub}">${sub}</option>`);
        }
    };

    window.openP2 = (cat) => {
        document.getElementById('catName').innerText = cat;
        const grid = document.getElementById('subGrid'); grid.innerHTML = "";
        data[cat].subs.forEach(s => grid.innerHTML += `<div class="card" onclick="openP3('${s}')"><h4>${s}</h4></div>`);
        showPage('p2');
    };

    window.openP3 = async (sub) => {
        document.getElementById('subName').innerText = sub;
        const list = document.getElementById('adList'); list.innerHTML = "";
        const snap = await getDocs(window.colRef);
        snap.forEach(d => {
            const a = d.data();
            if(a.sub == sub) {
                list.innerHTML += `<div class="ad-box"><h4>${a.title}</h4><button onclick="viewAd(${JSON.stringify(a).replace(/"/g, "'")})">عرض التفاصيل</button></div>`;
            }
        });
        showPage('p3');
    };

    window.viewAd = (a) => {
        document.getElementById('adDetails').innerHTML = `<h2>${a.title}</h2><p>الوصف: ${a.desc || 'لا يوجد'}</p>`;
        if(localStorage.getItem('userCode') == a.creatorCode) {
            document.getElementById('adDetails').innerHTML += `<button onclick="alert('تم التنشيط!')">تنشيط الإعلان</button>`;
        }
        showPage('p4');
    };

    window.publish = async () => {
        const uCode = document.getElementById('iCode').value;
        const expiry = new Date(); expiry.setDate(expiry.getDate() + 30);
        await addDoc(window.colRef, { creatorCode: uCode, expiry: Timestamp.fromDate(expiry), status: 'pending', title: document.getElementById('iSub').value });
        alert("✅ تم إرسال الإعلان للمراجعة!");
    };

    window.saveProfile = () => { localStorage.setItem('userCode', document.getElementById('pCode').value); alert("✅ تم الحفظ!"); };
</script>
</body>
</html>
