<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مزاد دمشق | غرفة التحكم</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyAvdxlQipjpSDcwex5Ucc0KXSw07RO2mPE", authDomain: "gg55-9a884.firebaseapp.com", projectId: "gg55-9a884", storageBucket: "gg55-9a884.firebasestorage.app", messagingSenderId: "82936706158", appId: "1:82936706158:web:36e00ec48e134f5205227f" };
        window.db = getFirestore(initializeApp(firebaseConfig));
        window.colRef = collection(window.db, "ads");
    </script>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: #fff; margin: 0; padding: 20px; }
        .page { display: none; } .active { display: block; }
        .nav { display: flex; justify-content: space-around; background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 8px; border: 1px solid #333; margin: 5px; text-align: center; cursor: pointer; }
        button { background: #27ae60; border: none; padding: 10px 20px; color: white; border-radius: 5px; cursor: pointer; }
        .control-box { border: 2px solid #27ae60; padding: 15px; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<!-- الصفحات الأربع المركزية -->
<div id="p1" class="page active">
    <h1>🇸🇾 مزاد دمشق</h1>
    <div class="nav">
        <button onclick="showPage('p1')">الرئيسية</button>
        <button onclick="showPage('p2')">الأقسام</button>
        <button onclick="showPage('p3')">إضافة</button>
        <button onclick="showPage('p4')">غرفة التحكم</button>
    </div>
    <div id="mainGrid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
</div>

<div id="p2" class="page">
    <h2>تصفح الأقسام</h2>
    <div id="cats" class="grid"></div>
</div>

<div id="p3" class="page">
    <h2>إضافة إعلان جديد</h2>
    <input type="text" id="iTitle" placeholder="اسم المنتج" style="width:100%; padding:10px;">
    <button onclick="addAd()">نشر الإعلان</button>
</div>

<div id="p4" class="page">
    <h2>👤 غرفة التحكم الخاصة بك</h2>
    <input type="text" id="myCode" placeholder="أدخل كودك الشخصي" onchange="loadMyAds()">
    <div id="myAds" class="control-box"></div>
</div>

<script type="module">
    const data = ["عقارات", "مركبات", "إلكترونيات", "أثاث", "حيوانات", "أغذية", "خدمات", "أزياء", "ترفيه", "صناعة"];
    
    window.showPage = (id) => { 
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
        document.getElementById(id).classList.add('active'); 
    };

    // تعبئة الأقسام
    const catsDiv = document.getElementById('cats');
    data.forEach(c => catsDiv.innerHTML += `<div class="card" onclick="alert('جاري عرض: ${c}')">${c}</div>`);

    // وظيفة غرفة التحكم
    window.loadMyAds = async () => {
        const code = document.getElementById('myCode').value;
        const list = document.getElementById('myAds');
        list.innerHTML = "جاري التحميل...";
        const snap = await getDocs(window.colRef);
        list.innerHTML = "";
        snap.forEach(d => {
            if(d.data().creatorCode == code) {
                list.innerHTML += `<div class="card">إعلانك: ${d.data().title} <button>تنشيط</button></div>`;
            }
        });
    };
    
    window.addAd = () => { alert("تم إرسال طلب النشر للمراجعة!"); };
</script>
</body>
</html>
